# LiveKit server config — production.
# https://docs.livekit.io/realtime/self-hosting/deployment/

port: 7880

bind_addresses:
  - "0.0.0.0"

rtc:
  use_external_ip: true
  port_range_start: 50000
  port_range_end: 50050
  tcp_port: 7881
  udp_port: 7882

keys:
  # Coolify substitutes ${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET} via the
  # LIVEKIT_KEYS env var. Empty here so the env var wins.

room:
  auto_create: true
  empty_timeout: 300       # 5 min — kill idle rooms
  max_participants: 12     # board size + a few observers

audio:
  active_level: 35
  min_percentile: 40

logging:
  level: info
  json: true
  sample: false

development: false

webhook:
  api_key: livekit-webhooks
  urls:
    - http://api:8000/api/v1/voice/webhook
