# ATRIO model registry — the single source of truth for agent→provider routing.
#
# Every agent in the codebase resolves its provider through this file (P5).
# Hot-reload: `gateway.registry().reload()` re-reads from disk.
#
# When running with ATRIO_MOCK_INFERENCE=true (default in local/test), every
# provider entry is served by the deterministic MockClient.
#
# Model names verified live against the Gemini API on 2026-05-19:
#   - gemini-2.5-flash  → OK (used for cost-sensitive agents + Facilitator)
#   - gemini-2.5-pro    → OK (used for Counsel where precision matters)
#
# IMPORTANT — gemini-2.5-pro caveat:
#   gemini-2.5-pro uses internal reasoning tokens that count against
#   maxOutputTokens. With max_tokens=1024 it routinely returns empty text
#   because reasoning consumes the whole budget. Use it ONLY for Counsel
#   (where reasoning is the value), with max_tokens >= 4096. For everything
#   else use gemini-2.5-flash which doesn't have the reasoning-token issue.
#
# Token budget rationale (verified 2026-05-19 in production):
#   At max_tokens=768 the 4 specialists (CFO/CTO/CMO/COO) were truncating
#   their answers mid-sentence (~120 chars chopped off when their analysis
#   ran 3-4 paragraphs). Bumping to 1536 -- enough headroom for a full
#   boardroom answer (3-4 paras of detailed reasoning) without bloating cost
#   noticeably.

agents:

  facilitator:
    primary:
      provider: gemini
      model: gemini-2.5-flash
    fallback:
      - provider: featherless
        model: meta-llama/Meta-Llama-3.1-70B-Instruct
    prompt_version: v1
    temperature: 0.6
    max_tokens: 1536
    metadata:
      role: "Plans the session, summarises, and synthesises consensus."

  cfo:
    primary:
      provider: gemini
      model: gemini-2.5-flash
    fallback:
      - provider: featherless
        model: meta-llama/Meta-Llama-3.1-70B-Instruct
    prompt_version: v1
    temperature: 0.5
    max_tokens: 1536
    metadata:
      role: "Cash, runway, ROI, treasury impact."

  cto:
    primary:
      provider: featherless
      model: Qwen/Qwen2.5-72B-Instruct
    fallback:
      - provider: gemini
        model: gemini-2.5-flash
    prompt_version: v1
    temperature: 0.6
    max_tokens: 1536
    metadata:
      role: "Engineering pragmatism, technical risk, build-vs-buy."

  cmo:
    primary:
      provider: featherless
      model: meta-llama/Meta-Llama-3.1-70B-Instruct
    fallback:
      - provider: gemini
        model: gemini-2.5-flash
    prompt_version: v1
    temperature: 0.7
    max_tokens: 1536
    metadata:
      role: "Positioning, narrative, customer perception."

  coo:
    primary:
      provider: featherless
      model: mistralai/Mistral-Large-Instruct-2407
    fallback:
      - provider: gemini
        model: gemini-2.5-flash
    prompt_version: v1
    temperature: 0.5
    max_tokens: 1536
    metadata:
      role: "Execution feasibility, sequencing, operational risk."

  counsel:
    primary:
      provider: gemini
      model: gemini-2.5-pro
    fallback:
      - provider: featherless
        model: meta-llama/Meta-Llama-3.1-70B-Instruct
    prompt_version: v1
    temperature: 0.4
    max_tokens: 4096  # 2.5-pro reasoning needs headroom; 1024 returns empty
    metadata:
      role: "Legal, regulatory, fiduciary."

  treasury:
    primary:
      provider: gemini
      model: gemini-2.5-flash
    fallback:
      - provider: featherless
        model: meta-llama/Meta-Llama-3.1-70B-Instruct
    prompt_version: v1
    temperature: 0.2
    max_tokens: 1024
    metadata:
      role: "Translates board consensus into a Kraken-executable plan."
